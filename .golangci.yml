version: "2"
linters:
  enable:
    - asciicheck
    - bodyclose
    - gocognit
    - goconst
    - gocritic
    - gosec
    - lll
    - nakedret
    - nestif
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - whitespace
  settings:
    goconst:
      ignore-tests: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
